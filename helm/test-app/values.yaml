replicaCount: 1
image:
  repository: application-service
  pullPolicy: IfNotPresent
  tag: "0.1.0-local"
nameOverride: "test-service"
fullnameOverride: "test-service"
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
  rules:
    - host: test.localhost
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: test-tls
    host: test.localhost
container:
  port: 8080
resources:
   limits:
     cpu: 200m
     memory: 250Mi
   requests:
     cpu: 100m
     memory: 128Mi