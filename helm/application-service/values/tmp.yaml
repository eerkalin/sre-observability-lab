---
# Source: application-service/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: application-service
  labels:
    app.kubernetes.io/name: application-service
    app.kubernetes.io/instance: application-service
    app.kubernetes.io/version: "0.1.0-local"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: application-service-0.1.0
data:
  APP_MODE: "helm-local-values-file"
  LOG_LEVEL: "INFO"
---
# Source: application-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: application-service
  labels:
    app.kubernetes.io/name: application-service
    app.kubernetes.io/instance: application-service
    app.kubernetes.io/version: "0.1.0-local"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: application-service-0.1.0
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: application-service
    app.kubernetes.io/instance: application-service

---
# Source: application-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  labels:
    app.kubernetes.io/name: application-service
    app.kubernetes.io/instance: application-service
    app.kubernetes.io/version: "0.1.0-local"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: application-service-0.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: application-service
      app.kubernetes.io/instance: application-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: application-service
        app.kubernetes.io/instance: application-service
      annotations:
        checksum/config: 99fe48fc3279752cdf3a5e32b9c21b821a9d1d386b2121ee0e3febc1ee77489c
    spec:
      containers:
        - name: application-service
          image: "application-service:0.1.0-local"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: application-service
                  key: APP_MODE
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: application-service
                  key: LOG_LEVEL
            - name: "FEATURE_X_ENABLED"
              value: "true"
            - name: "BUSINESS_REGION"
              value: "KZ"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
---
# Source: application-service/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: application-service
  labels:
    app.kubernetes.io/name: application-service
    app.kubernetes.io/instance: application-service
    app.kubernetes.io/version: "0.1.0-local"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: application-service-0.1.0
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - helm-app.localhost
      secretName: app-localhost-certmanager-tls
  rules:
    - host: helm-app.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: application-service
                port:
                  number: 8080
