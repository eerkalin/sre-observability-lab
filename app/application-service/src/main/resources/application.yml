spring: 
  application:
    name: application-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  environment: ${APP_ENVIRONMENT:local}
  owner: ${APP_OWNER:sre-lab}
  default-customer-segment: ${APP_DEFAULT_CUSTOMER_SEGMENT:STANDARD}
  slow-endpoint-enabled: ${APP_SLOW_ENDPOINT_ENABLED:true}
  default-slow-delay-ms: ${APP_DEFAULT_SLOW_DELAY_MS:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      minimum-expected-value:
        http.server.requests: 50ms
      maximum-expected-value:
        http.server.requests: 5s
    tags:
      application: ${spring.application.name}
      environment: ${app.environment}

info:
  app:
    name: ${spring.application.name}
    owner: ${app.owner}
    environment: ${app.environment}
    purpose: configurable Spring Boot service for SRE labs

logging:
  level:
    root: INFO
    com.srelab.applicationservice: INFO
