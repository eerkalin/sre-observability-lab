apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-localhost-cert
  namespace: monitoring
spec:
  secretName: grafana-localhost-certmanager-tls
  duration: 24h
  renewBefore: 12h
  commonName: grafana.localhost
  dnsNames:
    - grafana.localhost
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer