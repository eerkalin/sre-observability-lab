apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-config
  namespace: monitoring
data:
  config.yaml: |-
    logLevel: error
    # Говорим экспортеру просто выплевывать все ивенты в логи (stdout)
    receivers:
      - name: dump
        stdout: {}
    route:
      routes:
        - match:
            - receiver: dump