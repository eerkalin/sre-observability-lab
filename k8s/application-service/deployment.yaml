apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  namespace: sre-lab
  labels:
    app: application-service
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
        component: backend
      annotations:
        release.version: "0.1.0-local"
        release.description: "Production-like probes and rollout baseline"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: application-service
          image: application-service:0.1.0-local
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 10
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: application-service-config
            - secretRef:
                name: application-service-secret
          
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 50
          
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3  
          
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"