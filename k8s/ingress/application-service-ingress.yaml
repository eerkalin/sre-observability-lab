apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: application-service-ingress
  namespace: sre-lab
spec:
  ingressClassName: nginx
  rules:
    - host: app.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: application-service
                port:
                  number: 8080
