apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: application-service-ingress-path
  namespace: sre-lab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: app.localhost
      http:
        paths:
          - path: /app(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: application-service
                port:
                  number: 8080