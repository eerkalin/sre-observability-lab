apiVersion: v1
kind: Pod
metadata:
  name: storage-test-pod
  namespace: sre-lab
  labels:
    app: storage-test
spec:
  restartPolicy: Never
  containers:
    - name: storage-test
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: storage-test-pvc