- name: Local Basics
  hosts: local
  gather_facts: true
  
  tasks:
    - name: Create a directory
      ansible.builtin.file: 
        path: /tmp/ansible-demo
        state: directory
        mode: '0755'
    - name: Create a file
      ansible.builtin.copy:
        dest: /tmp/ansible-demo/hello.txt
        mode: '0644'
        content: "Привет, это текст внутри файла!"
    - name: Show OS family
      ansible.builtin.debug:
        msg: "The OS family is {{ ansible_os_family }}"
